name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: GitHub Actions environment to deploy.
        required: true
        type: choice
        options:
          - beta
          - production
      image_tag:
        description: Immutable backend image tag, such as sha-abcdef0 or v1.2.3.
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: backend-${{ inputs.deploy_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.deploy_environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.deploy_environment }}
    env:
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS || '*' }}
      BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL || secrets.BACKEND_PUBLIC_URL }}
      CADDY_EMAIL: ${{ vars.CADDY_EMAIL || secrets.CADDY_EMAIL }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REMOTE_DIR: videotogether
      ROOM_TTL: ${{ vars.ROOM_TTL || '3m' }}
      SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/videotogetherlite-server:${{ inputs.image_tag }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate environment configuration
        run: |
          : "${BACKEND_PUBLIC_URL:?BACKEND_PUBLIC_URL is required}"
          : "${CADDY_EMAIL:?CADDY_EMAIL is required}"
          : "${VPS_HOST:?VPS_HOST is required}"
          : "${VPS_USER:?VPS_USER is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY is required}"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Render deployment environment
        run: |
          backend_domain="${BACKEND_PUBLIC_URL#https://}"
          backend_domain="${backend_domain#http://}"
          backend_domain="${backend_domain%%/*}"
          cat > deploy/.env.generated <<EOF
          SERVER_IMAGE=${SERVER_IMAGE}
          BACKEND_DOMAIN=${backend_domain}
          CADDY_EMAIL=${CADDY_EMAIL}
          ROOM_TTL=${ROOM_TTL}
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          EOF

      - name: Upload deployment files
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" "mkdir -p ${REMOTE_DIR}"
          scp -i ~/.ssh/deploy_key deploy/docker-compose.yml deploy/Caddyfile deploy/.env.generated "${VPS_USER}@${VPS_HOST}:${REMOTE_DIR}/"
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" "mv ${REMOTE_DIR}/.env.generated ${REMOTE_DIR}/.env"

      - name: Pull and restart
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" "\
            cd ${REMOTE_DIR} \
            && docker login ghcr.io -u '${{ github.actor }}' -p '${GHCR_TOKEN}' \
            && docker compose pull \
            && docker compose up -d \
            && docker image prune -f"

      - name: Verify public health check
        run: curl --fail --retry 20 --retry-delay 3 --retry-all-errors "${BACKEND_PUBLIC_URL%/}/healthz"
