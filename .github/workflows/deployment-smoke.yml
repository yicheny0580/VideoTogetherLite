name: Deployment Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-caddy:
    name: Docker image behind Caddy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Docker and Caddy smoke
        run: node scripts/smoke-docker-deploy.mjs
