name: Release Build

on:
  push:
  pull_request:

jobs:
  build:
    name: build checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install JS dependencies
        run: npx pnpm@latest install --frozen-lockfile

      - name: Check JS
        run: |
          npx pnpm@latest lint
          npx pnpm@latest typecheck
          npx pnpm@latest test
          npx pnpm@latest build

      - name: Check Go server
        run: go test ./apps/server/...

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: apps/extension/dist
